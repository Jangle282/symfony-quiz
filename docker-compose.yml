services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 10s
      timeout: 5s
      retries: 5

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/srv/app:delegated
    environment:
      SYMFONY_ENV: dev
      DATABASE_URL: "postgresql://app:app@postgres:5432/app?serverVersion=15&charset=utf8"
    ports:
      - "9000:9000"

  nginx:
    image: nginx:stable
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - ./backend:/srv/app:ro
      - ./backend/nginx/conf.d:/etc/nginx/conf.d:ro

  node:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./frontend:/app:delegated
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  postgres_data:
  node_modules:
