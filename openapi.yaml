openapi: 3.0.0
info:
  title: 'Pub Quiz API'
  description: 'API for a multiplayer pub quiz game using Open Trivia Database'
  version: 1.0.0
paths:
  '/api/games/{gameId}/rounds/{roundId}/questions/{questionId}/answers/{answerId}/select':
    post:
      tags:
        - Answers
      summary: 'Select an answer for a question'
      operationId: post_api_game_select_answer
      parameters:
        -
          name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        -
          name: roundId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        -
          name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        -
          name: answerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Answer selected'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'Answer selected.' }
                  question_id: { type: string, format: uuid }
                  selected_answer_id: { type: string, format: uuid }
                type: object
        '400':
          description: 'Game is already completed'
        '403':
          description: 'Access denied'
        '404':
          description: 'Game, round, question, or answer not found'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  /api/login:
    post:
      tags:
        - Authentication
      summary: 'Authenticate user and get JWT token'
      operationId: post_api_login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  example: S3cure!Pass0
              type: object
      responses:
        '200':
          description: 'Login successful'
          content:
            application/json:
              schema:
                properties:
                  token: { description: 'JWT access token', type: string }
                  refresh_token: { description: 'Refresh token', type: string }
                  user: { properties: { id: { type: string, format: uuid }, username: { type: string }, createdAt: { type: string, format: date-time }, updatedAt: { type: string, format: date-time } }, type: object }
                type: object
        '401':
          description: 'Invalid credentials'
        '429':
          description: 'Too many requests'
  /api/logout:
    post:
      tags:
        - Authentication
      summary: 'Logout and revoke all refresh tokens'
      operationId: post_api_logout
      responses:
        '204':
          description: 'Successfully logged out'
        '401':
          description: Unauthorized
      security:
        -
          Bearer: []
  /api/token/refresh:
    post:
      tags:
        - Authentication
      summary: 'Refresh JWT token using a refresh token'
      operationId: post_api_token_refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
              type: object
      responses:
        '200':
          description: 'Token refreshed'
          content:
            application/json:
              schema:
                properties:
                  token: { description: 'New JWT access token', type: string }
                  refresh_token: { description: 'New rotated refresh token', type: string }
                  user: { properties: { id: { type: string, format: uuid }, username: { type: string }, createdAt: { type: string, format: date-time }, updatedAt: { type: string, format: date-time } }, type: object }
                type: object
        '400':
          description: 'Refresh token is required'
        '401':
          description: 'Invalid or expired refresh token'
        '429':
          description: 'Too many requests'
  /api/register:
    post:
      tags:
        - Authentication
      summary: 'Register a new user'
      operationId: post_api_register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: johndoe
                password:
                  type: string
                  example: S3cure!Pass0
              type: object
      responses:
        '201':
          description: 'User created'
          content:
            application/json:
              schema:
                properties:
                  id: { type: string, format: uuid }
                  username: { type: string }
                  createdAt: { type: string, format: date-time }
                  updatedAt: { type: string, format: date-time }
                type: object
        '400':
          description: 'Validation error'
        '409':
          description: 'Username already exists'
        '429':
          description: 'Too many requests'
  /api/games:
    post:
      tags:
        - Games
      summary: 'Create a new game'
      operationId: post_api_game_create
      requestBody:
        required: false
        content:
          application/json:
            schema:
              properties:
                difficulty:
                  type: string
                  example: medium
                  enum: [easy, medium, hard]
                name:
                  type: string
                  example: 'Friday Quiz'
                  nullable: true
              type: object
      responses:
        '201':
          description: 'Game created'
          content:
            application/json:
              schema:
                properties:
                  id: { type: string, format: uuid }
                  name: { type: string, nullable: true }
                  difficulty: { type: string }
                  round: { properties: { id: { type: string, format: uuid }, round_number: { type: integer }, category: { type: string } }, type: object }
                  first_question: { properties: { id: { type: string, format: uuid }, question_text: { type: string }, answers: { type: array, items: { properties: { id: { type: string, format: uuid }, answer_text: { type: string } }, type: object } } }, type: object, nullable: true }
                type: object
        '400':
          description: 'Invalid difficulty'
        '401':
          description: Unauthorized
        '429':
          description: 'Too many requests'
        '500':
          description: 'Server error'
      security:
        -
          Bearer: []
  '/api/games/{id}':
    get:
      tags:
        - Games
      summary: 'Get game details'
      operationId: get_api_game_show
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Game details'
          content:
            application/json:
              schema:
                properties:
                  id: { type: string, format: uuid }
                  name: { type: string, nullable: true }
                  difficulty: { type: string }
                  total_score: { type: integer }
                  started_at: { type: string, format: date-time }
                  completed_at: { type: string, format: date-time, nullable: true }
                  rounds: { type: array, items: { properties: { id: { type: string, format: uuid }, round_number: { type: integer }, category: { type: string }, total_questions: { type: integer }, answered_questions: { type: integer } }, type: object } }
                  current_question: { properties: { id: { type: string, format: uuid }, question_text: { type: string }, answers: { type: array, items: { properties: { id: { type: string, format: uuid }, answer_text: { type: string }, user_selected: { type: boolean } }, type: object } } }, type: object, nullable: true }
                type: object
        '403':
          description: 'Access denied'
        '404':
          description: 'Game not found'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
    delete:
      tags:
        - Games
      summary: 'Delete a game'
      operationId: delete_api_game_delete
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 'Game deleted'
        '403':
          description: 'Access denied'
        '404':
          description: 'Game not found'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  '/api/games/{id}/complete':
    post:
      tags:
        - Games
      summary: 'Complete a game'
      operationId: post_api_game_complete
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Game completed'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'Game completed.' }
                  game_id: { type: string, format: uuid }
                  total_score: { type: integer }
                  completed_at: { type: string, format: date-time }
                type: object
        '400':
          description: 'Game is already completed'
        '403':
          description: 'Access denied'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  '/api/games/{id}/results':
    get:
      tags:
        - Games
      summary: 'Get game results'
      operationId: get_api_game_results
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Game results'
          content:
            application/json:
              schema:
                properties:
                  game_id: { type: string, format: uuid }
                  total_score: { type: integer }
                  total_questions: { type: integer }
                  questions: { type: array, items: { properties: { question_id: { type: string, format: uuid }, question_text: { type: string }, correct_answer: { type: string, nullable: true }, selected_answer: { type: string, nullable: true }, is_correct: { type: boolean } }, type: object } }
                type: object
        '403':
          description: 'Access denied'
        '404':
          description: 'Game not found'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  /api/health:
    get:
      tags:
        - Health
      summary: 'Health check'
      operationId: get_api_health
      responses:
        '200':
          description: 'Service is healthy'
          content:
            application/json:
              schema:
                properties:
                  status: { type: string, example: ok }
                  timestamp: { type: string, format: date-time }
                type: object
  '/api/games/{gameId}/rounds/{roundId}/questions/{questionId}/next':
    get:
      tags:
        - Questions
      summary: 'Get next question in a round'
      operationId: get_api_game_next_question
      parameters:
        -
          name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        -
          name: roundId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        -
          name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Next question or null if no more questions'
          content:
            application/json:
              schema:
                properties:
                  question: { properties: { id: { type: string, format: uuid }, question_text: { type: string }, answers: { type: array, items: { properties: { id: { type: string, format: uuid }, answer_text: { type: string }, user_selected: { type: boolean } }, type: object } } }, type: object, nullable: true }
                type: object
        '403':
          description: 'Access denied'
        '404':
          description: 'Game, round, or question not found'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  '/api/games/{gameId}/rounds/{roundId}/questions/{questionId}/previous':
    get:
      tags:
        - Questions
      summary: 'Get previous question in a round'
      operationId: get_api_game_previous_question
      parameters:
        -
          name: gameId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        -
          name: roundId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        -
          name: questionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Previous question or null if at the first question'
          content:
            application/json:
              schema:
                properties:
                  question: { properties: { id: { type: string, format: uuid }, question_text: { type: string }, answers: { type: array, items: { properties: { id: { type: string, format: uuid }, answer_text: { type: string }, user_selected: { type: boolean } }, type: object } } }, type: object, nullable: true }
                type: object
        '403':
          description: 'Access denied'
        '404':
          description: 'Game, round, or question not found'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  '/api/user/{id}':
    get:
      tags:
        - Users
      summary: 'Get user profile and games'
      operationId: get_api_profile
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'User profile with games'
          content:
            application/json:
              schema:
                properties:
                  user: { properties: { id: { type: string, format: uuid }, username: { type: string }, createdAt: { type: string, format: date-time }, updatedAt: { type: string, format: date-time } }, type: object }
                  games: { type: array, items: { properties: { id: { type: string, format: uuid }, role: { type: string }, joinedAt: { type: string, format: date-time }, createdBy: { type: string, format: uuid }, totalScore: { type: integer }, startedAt: { type: string, format: date-time }, completedAt: { type: string, format: date-time, nullable: true } }, type: object } }
                type: object
        '401':
          description: Unauthorized
        '403':
          description: 'Access denied'
        '404':
          description: 'User not found'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  '/api/user/{id}/username':
    patch:
      tags:
        - Users
      summary: 'Update username'
      operationId: patch_api_profile_update_username
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - username
              properties:
                username:
                  type: string
                  example: newusername
              type: object
      responses:
        '200':
          description: 'Username updated'
          content:
            application/json:
              schema:
                properties:
                  user: { properties: { id: { type: string, format: uuid }, username: { type: string }, createdAt: { type: string, format: date-time }, updatedAt: { type: string, format: date-time } }, type: object }
                type: object
        '400':
          description: 'Username is required'
        '401':
          description: Unauthorized
        '403':
          description: 'Access denied'
        '409':
          description: 'Username already exists'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  '/api/user/{id}/password':
    patch:
      tags:
        - Users
      summary: 'Update password'
      operationId: patch_api_profile_update_password
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - current_password
                - new_password
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  example: N3w!Passw0rd
              type: object
      responses:
        '200':
          description: 'Password updated'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'Password updated successfully.' }
                type: object
        '400':
          description: 'Invalid current password or new password validation error'
        '401':
          description: Unauthorized
        '403':
          description: 'Access denied'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
  '/api/games/{id}/join':
    post:
      tags:
        - Games
      summary: 'Join a game as a participant'
      operationId: post_api_game_join
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 'Successfully joined the game'
          content:
            application/json:
              schema:
                properties:
                  message: { type: string, example: 'Successfully joined the game.' }
                  game_id: { type: string, format: uuid }
                  role: { type: string, example: participant }
                type: object
        '401':
          description: Unauthorized
        '409':
          description: 'Already joined this game'
        '429':
          description: 'Too many requests'
      security:
        -
          Bearer: []
components:
  securitySchemes:
    Bearer:
      type: http
      bearerFormat: JWT
      scheme: bearer
tags:
  -
    name: Answers
    description: Answers
  -
    name: Authentication
    description: Authentication
  -
    name: Games
    description: Games
  -
    name: Health
    description: Health
  -
    name: Questions
    description: Questions
  -
    name: Users
    description: Users

